<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" role="img" aria-labelledby="title desc"><title id="title">线性代数几何图</title><desc id="desc">向量投影、列空间、低秩方向和矩阵分解。</desc><rect width="900" height="360" fill="#fffefb"/><text x="44" y="48" font-family="PingFang SC, Arial" font-size="26" font-weight="800" fill="#1f2528">Vector Space, Projection and Low Rank</text><text x="46" y="76" font-family="PingFang SC, Arial" font-size="14" fill="#63706d">线代复习的核心不是矩阵符号，而是空间、方向、投影和主要结构。</text><g transform="translate(70 108)"><path d="M0 170 H300" stroke="#d5ddd5" stroke-width="2"/><path d="M40 150 L250 60" stroke="#c15f3c" stroke-width="5"/><path d="M52 47 L245 127" stroke="#c15f3c" stroke-width="4" marker-end="url(#arr1)"/><path d="M52 47 L116 117" stroke="#a34416" stroke-width="4" marker-end="url(#arr2)"/><path d="M116 117 L245 127" stroke="#a34416" stroke-width="2" stroke-dasharray="6 6"/><circle cx="52" cy="47" r="6" fill="#a34416"/><circle cx="116" cy="117" r="6" fill="#c15f3c"/><text x="20" y="36" font-family="PingFang SC, Arial" font-size="13" fill="#a34416">y</text><text x="128" y="113" font-family="PingFang SC, Arial" font-size="13" fill="#492011">projection</text><text x="190" y="52" font-family="PingFang SC, Arial" font-size="13" fill="#c15f3c">column space</text></g><defs><marker id="arr1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10z" fill="#c15f3c"/></marker><marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10z" fill="#a34416"/></marker></defs><g transform="translate(470 108)"><rect x="0" y="0" width="350" height="178" rx="8" fill="#eef4fa" stroke="#c7d6e8"/><text x="24" y="42" font-family="PingFang SC, Arial" font-size="18" font-weight="800" fill="#c15f3c">Decomposition view</text><text x="24" y="78" font-family="Menlo, monospace" font-size="16" fill="#1f2528">A = UΣVᵀ</text><text x="24" y="112" font-family="PingFang SC, Arial" font-size="14" fill="#4f5d6d">V: 输入主方向 · Σ: 尺度 · U: 输出主方向</text><text x="24" y="142" font-family="PingFang SC, Arial" font-size="14" fill="#4f5d6d">PCA / LoRA / 压缩 / 风险因子都在找主要方向。</text></g></svg>