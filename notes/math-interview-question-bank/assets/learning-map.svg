<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc"><title id="title">数学基础速修手册学习路径</title><desc id="desc">从微积分、线性代数、概率论通向大模型与量化应用的学习地图。</desc><rect width="1180" height="420" fill="#fffefb"/><defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#0f766e"/></marker><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#1f2528" flood-opacity="0.14"/></filter></defs><text x="58" y="62" font-family="PingFang SC, Arial" font-size="30" font-weight="800" fill="#1f2528">Mathematics Review Learning Map</text><text x="60" y="94" font-family="PingFang SC, Arial" font-size="15" fill="#63706d">先掌握三门基础课的对象语言，再接到 LLM 与 Quant 的真实应用。</text><g filter="url(#shadow)"><rect x="70" y="150" width="210" height="116" rx="8" fill="#eff8f4" stroke="#bfd8ce"/><text x="100" y="188" font-family="PingFang SC, Arial" font-size="24" font-weight="800" fill="#0b4f4a">微积分</text><text x="100" y="220" font-family="PingFang SC, Arial" font-size="14" fill="#4f625b">导数 · Taylor · 梯度 · Hessian</text><text x="100" y="245" font-family="PingFang SC, Arial" font-size="14" fill="#4f625b">回答变化率和优化方向</text></g><g filter="url(#shadow)"><rect x="355" y="150" width="210" height="116" rx="8" fill="#eef4fa" stroke="#c7d6e8"/><text x="385" y="188" font-family="PingFang SC, Arial" font-size="24" font-weight="800" fill="#284b7a">线性代数</text><text x="385" y="220" font-family="PingFang SC, Arial" font-size="14" fill="#4f5d6d">矩阵 · 秩 · SVD · PCA</text><text x="385" y="245" font-family="PingFang SC, Arial" font-size="14" fill="#4f5d6d">回答表示、投影和低秩结构</text></g><g filter="url(#shadow)"><rect x="640" y="150" width="210" height="116" rx="8" fill="#fff7ed" stroke="#e8c7aa"/><text x="670" y="188" font-family="PingFang SC, Arial" font-size="24" font-weight="800" fill="#a34416">概率论</text><text x="670" y="220" font-family="PingFang SC, Arial" font-size="14" fill="#6d5548">Bayes · MLE · KL · CLT</text><text x="670" y="245" font-family="PingFang SC, Arial" font-size="14" fill="#6d5548">回答不确定性和统计估计</text></g><g filter="url(#shadow)"><rect x="925" y="128" width="210" height="160" rx="8" fill="#f8fafc" stroke="#d5ddd5"/><text x="948" y="170" font-family="PingFang SC, Arial" font-size="22" font-weight="800" fill="#1f2528">应用桥接</text><text x="942" y="204" font-family="PingFang SC, Arial" font-size="13" fill="#63706d">LLM: softmax / attention</text><text x="942" y="228" font-family="PingFang SC, Arial" font-size="13" fill="#63706d">Quant: covariance / VaR</text><text x="942" y="252" font-family="PingFang SC, Arial" font-size="13" fill="#63706d">统一框架: 对象-公式-边界</text></g><path d="M280 208 H345" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow)"/><path d="M565 208 H630" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow)"/><path d="M850 208 H915" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow)"/><path d="M175 282 C260 346 505 354 745 286" fill="none" stroke="#284b7a" stroke-width="2" stroke-dasharray="7 7"/><path d="M745 286 C830 326 942 324 1020 296" fill="none" stroke="#a34416" stroke-width="2" stroke-dasharray="7 7"/><text x="78" y="356" font-family="PingFang SC, Arial" font-size="14" fill="#63706d">复习原则：公式必须能解释对象、几何直觉、概率含义、优化作用和岗位边界。</text></svg>