<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" role="img" aria-labelledby="title desc"><title id="title">微积分与优化示意图</title><desc id="desc">等高线、梯度方向、负梯度下降和二阶曲率。</desc><rect width="900" height="360" fill="#fffefb"/><text x="44" y="48" font-family="PingFang SC, Arial" font-size="26" font-weight="800" fill="#1f2528">Gradient, Taylor and Curvature</text><text x="46" y="76" font-family="PingFang SC, Arial" font-size="14" fill="#63706d">导数给局部线性方向，Hessian 给二阶曲率，优化就是在局部近似中移动。</text><g transform="translate(70 110)"><ellipse cx="160" cy="105" rx="142" ry="76" fill="none" stroke="#bfd8ce" stroke-width="3"/><ellipse cx="160" cy="105" rx="100" ry="52" fill="none" stroke="#8fbdae" stroke-width="3"/><ellipse cx="160" cy="105" rx="58" ry="30" fill="none" stroke="#0f766e" stroke-width="3"/><circle cx="232" cy="76" r="7" fill="#a34416"/><path d="M232 76 L277 45" stroke="#a34416" stroke-width="4" marker-end="url(#arrow-red)"/><path d="M232 76 L187 107" stroke="#0f766e" stroke-width="4" marker-end="url(#arrow-green)"/><text x="286" y="45" font-family="PingFang SC, Arial" font-size="13" fill="#a34416">gradient</text><text x="112" y="128" font-family="PingFang SC, Arial" font-size="13" fill="#0b4f4a">negative gradient</text></g><defs><marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10z" fill="#0f766e"/></marker><marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10z" fill="#a34416"/></marker></defs><g transform="translate(485 110)"><rect x="0" y="0" width="340" height="176" rx="8" fill="#eff8f4" stroke="#d5ddd5"/><text x="24" y="42" font-family="PingFang SC, Arial" font-size="18" font-weight="800" fill="#0b4f4a">Local model</text><text x="24" y="78" font-family="Menlo, monospace" font-size="16" fill="#1f2528">f(x+Δ) ≈ f(x) + gᵀΔ + 1/2 ΔᵀHΔ</text><text x="24" y="118" font-family="PingFang SC, Arial" font-size="14" fill="#4b5b50">g: 方向 · H: 曲率 · η: 步长</text><text x="24" y="146" font-family="PingFang SC, Arial" font-size="14" fill="#4b5b50">学习关键：能把公式说成优化行为。</text></g></svg>