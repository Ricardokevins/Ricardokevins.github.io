<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" role="img" aria-labelledby="title desc" preserveAspectRatio="xMidYMid meet"><title id="title">概率分布与尾部风险</title><desc id="desc">概率密度、期望、尾部风险和贝叶斯更新。</desc><rect width="900" height="360" fill="#fffefb"/><text x="44" y="48" font-family="PingFang SC, Arial" font-size="26" font-weight="800" fill="#1f2528">Distribution, Expectation and Tail Risk</text><text x="46" y="76" font-family="PingFang SC, Arial" font-size="14" fill="#63706d">概率论把不确定性变成可计算的分布、期望、估计和风险。</text><g transform="translate(66 112)"><path d="M0 170 H340" stroke="#d5ddd5" stroke-width="2"/><path d="M18 170 C65 166, 82 130, 118 92 C150 58, 190 58, 223 92 C260 130, 278 166, 326 170" fill="none" stroke="#0f766e" stroke-width="4"/><path d="M260 132 C276 158, 294 167, 326 170 L260 170 Z" fill="#f2c7a7" opacity=".8"/><line x1="180" y1="58" x2="180" y2="170" stroke="#284b7a" stroke-width="3" stroke-dasharray="7 7"/><text x="162" y="196" font-family="PingFang SC, Arial" font-size="13" fill="#284b7a">E[X]</text><text x="264" y="126" font-family="PingFang SC, Arial" font-size="13" fill="#a34416">tail</text><text x="40" y="36" font-family="PingFang SC, Arial" font-size="14" fill="#63706d">density integrates to probability</text></g><g transform="translate(482 112)"><rect x="0" y="0" width="345" height="210" rx="8" fill="#fff7ed" stroke="#e8c7aa"/><text x="24" y="42" font-family="PingFang SC, Arial" font-size="18" font-weight="800" fill="#a34416">Bayes update</text><text x="24" y="78" font-family="Menlo, monospace" font-size="16" fill="#1f2528">posterior ∝ likelihood × prior</text><text x="24" y="112" font-family="PingFang SC, Arial" font-size="14" fill="#6d5548">看见新证据后，重新分配不同原因或参数的可信度。</text><text x="24" y="142" font-family="PingFang SC, Arial" font-size="13" font-weight="700" fill="#8a4a22">应用直觉</text><text x="24" y="164" font-family="PingFang SC, Arial" font-size="13" fill="#6d5548"><tspan x="24" dy="0">· LLM：next-token 分布是</tspan><tspan x="24" dy="18">条件 categorical。</tspan></text><text x="24" y="202" font-family="PingFang SC, Arial" font-size="13" fill="#6d5548"><tspan x="24" dy="0">· Quant：收益 / 风险分布</tspan><tspan x="24" dy="18">关心的是尾部而非均值。</tspan></text></g></svg>
