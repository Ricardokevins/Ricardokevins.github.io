<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-label="量化误差来源图">
  <rect width="980" height="360" fill="#fffdf8"/>
  <defs><marker id="d" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#0f766e"/></marker></defs>
  <text x="34" y="45" font-family="PingFang SC, sans-serif" font-size="26" font-weight="800" fill="#20242a">量化：从浮点权重到低比特权重</text>
  <g font-family="PingFang SC, sans-serif" font-size="15" font-weight="700">
    <rect x="55" y="135" width="130" height="70" rx="9" fill="#f2fbf7" stroke="#0f766e"/><text x="88" y="176" fill="#0b4f4a">FP16 W</text>
    <rect x="250" y="135" width="130" height="70" rx="9" fill="#fff7ed" stroke="#b45309"/><text x="282" y="164" fill="#7c2d12">Scale</text><text x="276" y="188" fill="#7c2d12">/ Group</text>
    <rect x="445" y="135" width="130" height="70" rx="9" fill="#f8fafc" stroke="#60755d"/><text x="474" y="176" fill="#39413e">Round</text>
    <rect x="640" y="135" width="130" height="70" rx="9" fill="#fff7ed" stroke="#b45309"/><text x="668" y="176" fill="#7c2d12">INT4/8</text>
    <rect x="835" y="135" width="95" height="70" rx="9" fill="#20242a"/><text x="850" y="176" fill="#fffdf8">Dequant</text>
  </g>
  <g stroke="#0f766e" stroke-width="2.4" fill="none" marker-end="url(#d)">
    <path d="M185 170 H250"/><path d="M380 170 H445"/><path d="M575 170 H640"/><path d="M770 170 H835"/>
  </g>
  <text x="70" y="278" font-family="PingFang SC, sans-serif" font-size="15" fill="#66706c">误差来源：分组统计不准、rounding、clip 饱和、激活 outlier；GPTQ/AWQ 的差异主要在如何降低这些误差对输出的影响。</text>
</svg>