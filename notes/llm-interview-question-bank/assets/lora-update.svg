<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-label="LoRA 低秩更新图">
  <rect width="980" height="360" fill="#fffdf8"/>
  <text x="34" y="45" font-family="PingFang SC, sans-serif" font-size="26" font-weight="800" fill="#20242a">LoRA：冻结原权重，只训练低秩增量</text>
  <g font-family="PingFang SC, sans-serif" font-size="16" font-weight="700">
    <rect x="70" y="135" width="120" height="80" rx="9" fill="#fbf4ee" stroke="#c15f3c"/><text x="112" y="181" fill="#492011">x</text>
    <rect x="275" y="100" width="150" height="150" rx="9" fill="#f8fafc" stroke="#60755d"/><text x="312" y="169" fill="#39413e">Frozen W</text><text x="303" y="195" fill="#66706c" font-size="13">不更新</text>
    <text x="465" y="182" fill="#20242a" font-size="30">+</text>
    <rect x="535" y="122" width="70" height="105" rx="9" fill="#fff7ed" stroke="#b45309"/><text x="560" y="181" fill="#7c2d12">A</text>
    <rect x="625" y="142" width="125" height="65" rx="9" fill="#fff7ed" stroke="#b45309"/><text x="680" y="181" fill="#7c2d12">B</text>
    <rect x="835" y="135" width="90" height="80" rx="9" fill="#20242a"/><text x="872" y="181" fill="#fffdf8">y</text>
  </g>
  <g stroke="#c15f3c" stroke-width="2.4" fill="none">
    <path d="M190 175 H275"/><path d="M425 175 H455"/><path d="M495 175 H535"/><path d="M750 175 H835"/>
  </g>
  <text x="72" y="300" font-family="PingFang SC, sans-serif" font-size="15" fill="#66706c">公式：W' = W + (alpha/r)BA。优势是参数少、可插拔；代价是表达能力受 rank 和注入层选择限制。</text>
</svg>