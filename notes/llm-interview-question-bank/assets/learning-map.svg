<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="420" viewBox="0 0 1280 420" role="img" aria-label="大模型面试学习路径导图">
  <rect width="1280" height="420" fill="#fffdf8"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#c15f3c"/></marker>
  </defs>
  <text x="40" y="58" font-family="PingFang SC, sans-serif" font-size="30" font-weight="800" fill="#20242a">LLM 面试题库学习路径</text>
  <text x="40" y="92" font-family="PingFang SC, sans-serif" font-size="15" fill="#66706c">先建立主干，再按岗位进入系统、算法、应用和前沿专项。</text>
  <g font-family="PingFang SC, sans-serif" font-size="16" font-weight="700">
    <rect x="40" y="150" width="200" height="72" rx="10" fill="#fbf4ee" stroke="#c15f3c"/><text x="70" y="180" fill="#492011">基础主干</text><text x="70" y="205" fill="#66706c" font-size="13">Transformer / Tokenizer</text>
    <rect x="320" y="88" width="180" height="72" rx="10" fill="#fff7ed" stroke="#b45309"/><text x="350" y="118" fill="#7c2d12">训练与对齐</text><text x="350" y="143" fill="#66706c" font-size="13">SFT / LoRA / RLHF</text>
    <rect x="320" y="215" width="180" height="72" rx="10" fill="#fff7ed" stroke="#b45309"/><text x="350" y="245" fill="#7c2d12">推理与系统</text><text x="350" y="270" fill="#66706c" font-size="13">KV / Serving / ZeRO</text>
    <rect x="580" y="88" width="180" height="72" rx="10" fill="#f5f7f4" stroke="#60755d"/><text x="610" y="118" fill="#39413e">RAG / Agent</text><text x="610" y="143" fill="#66706c" font-size="13">检索 / 工具 / 协议</text>
    <rect x="580" y="215" width="180" height="72" rx="10" fill="#f5f7f4" stroke="#60755d"/><text x="610" y="245" fill="#39413e">数学 / Reasoning</text><text x="610" y="270" fill="#66706c" font-size="13">优化器 / DPO / PPO</text>
    <rect x="840" y="150" width="180" height="72" rx="10" fill="#fbf4ee" stroke="#c15f3c"/><text x="870" y="180" fill="#492011">前沿专项</text><text x="870" y="205" fill="#66706c" font-size="13">VLM / MCP / 合成数据</text>
    <rect x="1090" y="150" width="170" height="72" rx="10" fill="#20242a"/><text x="1120" y="180" fill="#fffdf8">岗位表达</text><text x="1120" y="205" fill="#d8d0c2" font-size="13">题目 → 机制 → 取舍</text>
  </g>
  <g stroke="#c15f3c" stroke-width="2.5" fill="none" marker-end="url(#arrow)">
    <path d="M240 186 C280 186, 280 124, 320 124"/>
    <path d="M240 186 C280 186, 280 251, 320 251"/>
    <path d="M500 124 H580"/>
    <path d="M500 251 H580"/>
    <path d="M760 124 C800 124, 800 186, 840 186"/>
    <path d="M760 251 C800 251, 800 186, 840 186"/>
    <path d="M1020 186 H1090"/>
  </g>
</svg>
