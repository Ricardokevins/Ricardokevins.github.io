<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-label="大模型面试学习路径导图">
  <rect width="1200" height="420" fill="#fffdf8"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#0f766e"/></marker>
  </defs>
  <text x="40" y="58" font-family="PingFang SC, sans-serif" font-size="30" font-weight="800" fill="#20242a">LLM 面试题库学习路径</text>
  <text x="40" y="92" font-family="PingFang SC, sans-serif" font-size="15" fill="#66706c">先建立主干，再按岗位进入系统、算法、应用和前沿专项。</text>
  <g font-family="PingFang SC, sans-serif" font-size="16" font-weight="700">
    <rect x="48" y="150" width="170" height="72" rx="10" fill="#f2fbf7" stroke="#0f766e"/><text x="78" y="180" fill="#0b4f4a">基础主干</text><text x="78" y="205" fill="#66706c" font-size="13">Transformer / Tokenizer</text>
    <rect x="280" y="88" width="180" height="72" rx="10" fill="#fff7ed" stroke="#b45309"/><text x="310" y="118" fill="#7c2d12">训练与对齐</text><text x="310" y="143" fill="#66706c" font-size="13">SFT / LoRA / RLHF</text>
    <rect x="280" y="215" width="180" height="72" rx="10" fill="#fff7ed" stroke="#b45309"/><text x="310" y="245" fill="#7c2d12">推理与系统</text><text x="310" y="270" fill="#66706c" font-size="13">KV / Serving / ZeRO</text>
    <rect x="535" y="88" width="180" height="72" rx="10" fill="#f8fafc" stroke="#60755d"/><text x="565" y="118" fill="#39413e">RAG / Agent</text><text x="565" y="143" fill="#66706c" font-size="13">检索 / 工具 / 协议</text>
    <rect x="535" y="215" width="180" height="72" rx="10" fill="#f8fafc" stroke="#60755d"/><text x="565" y="245" fill="#39413e">数学 / Reasoning</text><text x="565" y="270" fill="#66706c" font-size="13">优化器 / DPO / PPO</text>
    <rect x="790" y="150" width="180" height="72" rx="10" fill="#f2fbf7" stroke="#0f766e"/><text x="820" y="180" fill="#0b4f4a">前沿专项</text><text x="820" y="205" fill="#66706c" font-size="13">VLM / MCP / 合成数据</text>
    <rect x="1030" y="150" width="130" height="72" rx="10" fill="#20242a"/><text x="1060" y="180" fill="#fffdf8">岗位表达</text><text x="1060" y="205" fill="#d8d0c2" font-size="13">题目 → 机制 → 取舍</text>
  </g>
  <g stroke="#0f766e" stroke-width="2.5" fill="none" marker-end="url(#arrow)">
    <path d="M218 186 C245 150, 250 126, 280 124"/>
    <path d="M218 186 C245 220, 250 250, 280 250"/>
    <path d="M460 124 H535"/>
    <path d="M460 250 H535"/>
    <path d="M715 124 C750 140, 755 170, 790 186"/>
    <path d="M715 250 C750 225, 755 205, 790 186"/>
    <path d="M970 186 H1030"/>
  </g>
</svg>