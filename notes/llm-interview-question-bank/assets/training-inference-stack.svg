<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-label="训练与推理系统栈">
  <rect width="980" height="360" fill="#fffdf8"/>
  <text x="34" y="45" font-family="PingFang SC, sans-serif" font-size="26" font-weight="800" fill="#20242a">训练 / 推理系统栈</text>
  <g font-family="PingFang SC, sans-serif" font-size="15" font-weight="700">
    <rect x="70" y="80" width="840" height="48" rx="8" fill="#fbf4ee" stroke="#c15f3c"/><text x="96" y="110" fill="#492011">模型结构：Dense / MoE / GQA / MLA / RoPE</text>
    <rect x="70" y="142" width="840" height="48" rx="8" fill="#fff7ed" stroke="#b45309"/><text x="96" y="172" fill="#7c2d12">训练并行：DP / TP / PP / EP / ZeRO / FSDP</text>
    <rect x="70" y="204" width="840" height="48" rx="8" fill="#f8fafc" stroke="#60755d"/><text x="96" y="234" fill="#39413e">显存与通信：权重 / 梯度 / 优化器状态 / 激活 / all-reduce / all-gather</text>
    <rect x="70" y="266" width="840" height="48" rx="8" fill="#20242a"/><text x="96" y="296" fill="#fffdf8">Serving：KV Cache / PagedAttention / Continuous Batching / Speculative Decoding</text>
  </g>
  <text x="72" y="340" font-family="PingFang SC, sans-serif" font-size="14" fill="#66706c">面试表达顺序：先说瓶颈，再说机制，再说收益与副作用。</text>
</svg>