<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-label="Scaled Dot Product Attention 数据流">
  <rect width="980" height="360" fill="#fffdf8"/>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#0f766e"/></marker></defs>
  <text x="34" y="45" font-family="PingFang SC, sans-serif" font-size="26" font-weight="800" fill="#20242a">Scaled Dot-Product Attention</text>
  <g font-family="SFMono-Regular, Menlo, monospace" font-size="15" font-weight="700">
    <rect x="50" y="95" width="110" height="58" rx="9" fill="#f2fbf7" stroke="#0f766e"/><text x="88" y="130" fill="#0b4f4a">Q</text>
    <rect x="50" y="205" width="110" height="58" rx="9" fill="#f2fbf7" stroke="#0f766e"/><text x="88" y="240" fill="#0b4f4a">K,V</text>
    <rect x="230" y="125" width="150" height="80" rx="9" fill="#fff7ed" stroke="#b45309"/><text x="258" y="158" fill="#7c2d12">QK^T</text><text x="258" y="184" fill="#7c2d12">/ sqrt(d_k)</text>
    <rect x="455" y="125" width="135" height="80" rx="9" fill="#f8fafc" stroke="#60755d"/><text x="488" y="172" fill="#39413e">softmax</text>
    <rect x="665" y="125" width="135" height="80" rx="9" fill="#f2fbf7" stroke="#0f766e"/><text x="704" y="158" fill="#0b4f4a">weights</text><text x="705" y="184" fill="#0b4f4a">× V</text>
    <rect x="850" y="125" width="90" height="80" rx="9" fill="#20242a"/><text x="875" y="172" fill="#fffdf8">O</text>
  </g>
  <g stroke="#0f766e" stroke-width="2.4" fill="none" marker-end="url(#a)">
    <path d="M160 124 H230"/><path d="M160 234 C190 234, 198 165, 230 165"/><path d="M380 165 H455"/><path d="M590 165 H665"/><path d="M800 165 H850"/>
  </g>
  <text x="240" y="270" font-family="PingFang SC, sans-serif" font-size="15" fill="#66706c">核心公式：Attention(Q,K,V)=softmax(QK^T / sqrt(d_k))V</text>
</svg>