<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-label="MHA GQA MQA KV 头共享对比图">
  <rect width="980" height="360" fill="#fffdf8"/>
  <text x="34" y="45" font-family="PingFang SC, sans-serif" font-size="26" font-weight="800" fill="#20242a">MHA / GQA / MQA：KV 头共享方式</text>
  <g font-family="PingFang SC, sans-serif" font-size="15" font-weight="700">
    <text x="60" y="94" fill="#0b4f4a">MHA：每个 Query 头各有一组 K/V</text>
    <g transform="translate(60 115)">
      <rect width="90" height="45" rx="8" fill="#f2fbf7" stroke="#0f766e"/><text x="30" y="29" fill="#0b4f4a">Q1</text>
      <rect x="105" width="90" height="45" rx="8" fill="#fff7ed" stroke="#b45309"/><text x="130" y="29" fill="#7c2d12">KV1</text>
      <rect x="220" width="90" height="45" rx="8" fill="#f2fbf7" stroke="#0f766e"/><text x="250" y="29" fill="#0b4f4a">Q2</text>
      <rect x="325" width="90" height="45" rx="8" fill="#fff7ed" stroke="#b45309"/><text x="350" y="29" fill="#7c2d12">KV2</text>
      <rect x="440" width="90" height="45" rx="8" fill="#f2fbf7" stroke="#0f766e"/><text x="470" y="29" fill="#0b4f4a">Q3</text>
      <rect x="545" width="90" height="45" rx="8" fill="#fff7ed" stroke="#b45309"/><text x="570" y="29" fill="#7c2d12">KV3</text>
    </g>
    <text x="60" y="205" fill="#7c2d12">GQA：多组 Query 共享较少 K/V 组</text>
    <g transform="translate(60 225)">
      <rect width="72" height="45" rx="8" fill="#f2fbf7" stroke="#0f766e"/><text x="20" y="29" fill="#0b4f4a">Q1</text>
      <rect x="82" width="72" height="45" rx="8" fill="#f2fbf7" stroke="#0f766e"/><text x="102" y="29" fill="#0b4f4a">Q2</text>
      <rect x="164" width="100" height="45" rx="8" fill="#fff7ed" stroke="#b45309"/><text x="196" y="29" fill="#7c2d12">KV1</text>
      <rect x="320" width="72" height="45" rx="8" fill="#f2fbf7" stroke="#0f766e"/><text x="340" y="29" fill="#0b4f4a">Q3</text>
      <rect x="402" width="72" height="45" rx="8" fill="#f2fbf7" stroke="#0f766e"/><text x="422" y="29" fill="#0b4f4a">Q4</text>
      <rect x="484" width="100" height="45" rx="8" fill="#fff7ed" stroke="#b45309"/><text x="516" y="29" fill="#7c2d12">KV2</text>
    </g>
    <text x="690" y="94" fill="#39413e">MQA：所有 Query 头共享一组 K/V</text>
    <g transform="translate(690 115)">
      <rect width="65" height="45" rx="8" fill="#f2fbf7" stroke="#0f766e"/><text x="18" y="29" fill="#0b4f4a">Q1</text>
      <rect x="75" width="65" height="45" rx="8" fill="#f2fbf7" stroke="#0f766e"/><text x="93" y="29" fill="#0b4f4a">Q2</text>
      <rect x="150" width="65" height="45" rx="8" fill="#f2fbf7" stroke="#0f766e"/><text x="168" y="29" fill="#0b4f4a">Q3</text>
      <rect x="50" y="78" width="120" height="48" rx="8" fill="#20242a"/><text x="87" y="108" fill="#fffdf8">KV</text>
    </g>
  </g>
  <text x="60" y="322" font-family="PingFang SC, sans-serif" font-size="15" fill="#66706c">结论：从 MHA 到 GQA/MQA，主要是降低 KV cache 与 decode 带宽压力；副作用是共享 K/V 可能带来表达能力损失。</text>
</svg>