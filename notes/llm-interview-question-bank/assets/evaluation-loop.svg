<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-label="评测闭环图">
  <rect width="980" height="360" fill="#fffdf8"/>
  <defs><marker id="e" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#c15f3c"/></marker></defs>
  <text x="34" y="45" font-family="PingFang SC, sans-serif" font-size="26" font-weight="800" fill="#20242a">评测：任务、裁判、指标、误差分析要闭环</text>
  <g font-family="PingFang SC, sans-serif" font-size="15" font-weight="700">
    <rect x="80" y="125" width="130" height="68" rx="9" fill="#fbf4ee" stroke="#c15f3c"/><text x="112" y="165" fill="#492011">Task Set</text>
    <rect x="270" y="125" width="130" height="68" rx="9" fill="#fff7ed" stroke="#b45309"/><text x="310" y="165" fill="#7c2d12">Model</text>
    <rect x="460" y="125" width="130" height="68" rx="9" fill="#f8fafc" stroke="#60755d"/><text x="493" y="165" fill="#39413e">Judge</text>
    <rect x="650" y="125" width="130" height="68" rx="9" fill="#fff7ed" stroke="#b45309"/><text x="690" y="165" fill="#7c2d12">Metric</text>
    <rect x="460" y="240" width="130" height="55" rx="9" fill="#20242a"/><text x="485" y="274" fill="#fffdf8">Error Slice</text>
  </g>
  <g stroke="#c15f3c" stroke-width="2.4" fill="none" marker-end="url(#e)">
    <path d="M210 159 H270"/><path d="M400 159 H460"/><path d="M590 159 H650"/>
    <path d="M715 193 C700 250, 640 268, 590 268"/><path d="M460 268 C380 268, 335 220, 335 193"/>
  </g>
  <text x="82" y="326" font-family="PingFang SC, sans-serif" font-size="15" fill="#66706c">不要只说 benchmark 名称；要说明输入输出、评分对象、裁判可靠性和失败样本分布。</text>
</svg>